<nz-layout class="app-layout">
  <nz-header [ngClass]="GetHeaderCsl()">
    <div id="welcome" [ngClass]="GetLogoCsl()">
      <a class="logo-row">
        <nz-icon class="dotnet-icon" nzType="dot-net" nzTheme="outline" />
        <h1 [ngClass]="GetTextCsl()">MAXICRAFT</h1>
      </a>
    </div>
    <ul nz-menu class="top-nav" [nzTheme]="GetAppLightTheme()" nzMode="horizontal">
      <li routerLink="/welcome" [ngClass]="GetTextCsl()" nz-menu-item 
      routerLinkActive="ant-menu-item-selected"><a>{{'Start' | translate}}</a></li>
      <li routerLink="/about" routerLinkActive="ant-menu-item-selected"
       [ngClass]="GetTextCsl()" nz-menu-item><a>{{'AboutMe' | translate}}</a></li>
      <li routerLink="/services" routerLinkActive="ant-menu-item-selected" [ngClass]="GetTextCsl()" 
        nz-menu-item><a>{{'Services' | translate}}</a></li>
    </ul>
    <div class="switch-light">
      <nz-switch
          [(ngModel)]="IsNight"
          class="lighter"
          (ngModelChange)="onThemeChange()"
          [nzCheckedChildren]="checkedTemplate"
          [nzUnCheckedChildren]="unCheckedTemplate">
      </nz-switch>
    </div>
    <div>
         <a nz-dropdown [nzDropdownMenu]="menu">
            <nz-icon style="margin-right: 10px;" nzType="global" nzTheme="outline" />
          <nz-icon nzType="down" />
        </a>
      <nz-dropdown-menu #menu="nzDropdownMenu">
      <ul nz-menu nzSelectable>
        <li (click)="onSelectLang('ru')" [ngClass]="GetActiveLangClass('ru')" nz-menu-item>RU</li>
        <li (click)="onSelectLang('en')" [ngClass]="GetActiveLangClass('en')" nz-menu-item>ENG</li>
      </ul>
    </nz-dropdown-menu>
    </div>
    <div>
      <button (click)="onClickTouch()" nz-button [nzSize]="size" nzType="primary">{{'GetInTouch' | translate}}</button>
     </div>
    <ng-template #checkedTemplate><nz-icon nzType="moon"/></ng-template>
    <ng-template #unCheckedTemplate><nz-icon nzType="sun"/></ng-template>
  </nz-header> 
  <nz-content>  
    <div [ngClass]="{'dark-theme': IsNight}" class="inner-content">
      <router-outlet></router-outlet>
    </div>
  </nz-content>
</nz-layout>
